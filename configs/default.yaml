experiment_name: default

seed: 42
device: cpu
dataset_dir: data

dataset:
  name: mnist # For now, only MNIST supported
  image_size: [28, 28]
  fold: 0

model: 
  name: mlp
  dropout: 0

train:
  batch_size: 256
  num_workers: 8
  epochs: 10
  warmup_epochs: 0
  label_smoothing: 0

optimizer:  # Adam
    lr: 1e-3
    wd: 1e-2

stop:
  min_delta: 1e-3
  patience: 50

# To disable wandb mode: disabled
wandb:
  mode: offline

hydra:
  run:
    dir: experiments/${experiment_name}
